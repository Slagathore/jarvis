  primevideo.com:         watching_media
  twitter.com:            browsing_social
  x.com:                  browsing_social
  reddit.com:             browsing_social
  instagram.com:          browsing_social
  facebook.com:           browsing_social
  tiktok.com:             browsing_social
  github.com:             coding
  stackoverflow.com:      coding
  docs.python.org:        coding
  notion.so:              note_taking
  obsidian:               note_taking
  comfyui:                ai_image_gen
