  # Games & launchers
  steam.exe:              gaming
  steamwebhelper.exe:     gaming
  epicgameslauncher.exe:  gaming
  gameoverlayui.exe:      gaming
  leagueclient.exe:       gaming
  riotclientservices.exe: gaming
  minecraft.exe:          gaming
  # Specific game executables
  cs2.exe:                gaming
  cyberpunk2077.exe:      gaming
  elden_ring.exe:         gaming
  baldursgate3.exe:       gaming

  # Communication
  discord.exe:            browsing_social
  zoom.exe:               video_call
  teams.exe:              video_call
  slack.exe:              browsing_general
  signal.exe:             browsing_social

  # Development
  code.exe:               coding
  devenv.exe:             coding
  pycharm64.exe:          coding
  webstorm64.exe:         coding
  rider64.exe:            coding
  windowsterminal.exe:    coding
  wt.exe:                 coding
  powershell.exe:         coding

  # Media
  vlc.exe:                watching_media
  mpv.exe:                watching_media
  mpc-hc64.exe:           watching_media
  potplayermini64.exe:    watching_media
  wmplayer.exe:           watching_media
  spotify.exe:            browsing_general

  # Creative / AI
  comfyui:                ai_image_gen
  automatic1111:          ai_image_gen
  invokeai.exe:           ai_image_gen
  krita.exe:              writing
  gimp-2.10.exe:          writing
  blender.exe:            ai_image_gen

  # Writing / Notes
  notepad++.exe:          writing
  obsidian.exe:           note_taking
  notion.exe:             note_taking
  typora.exe:             writing
  winword.exe:            writing
  onenote.exe:            note_taking

